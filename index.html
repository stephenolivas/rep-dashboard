<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Performance Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f6f8;
    --white: #ffffff;
    --text: #1a1d23;
    --text-secondary: #5f6b7a;
    --text-muted: #8c95a4;
    --text-faint: #b0b8c6;
    --border: #e5e7ec;
    --border-light: #eef0f3;
    --row-hover: #f8f9fb;
    --green: #10b981;
    --green-bg: #ecfdf5;
    --teal: #0d9488;
    --blue: #3b82f6;
    --amber: #f59e0b;
    --amber-bg: #fffbeb;
    --red: #ef4444;
    --red-bg: #fef2f2;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 1360px;
    margin: 0 auto;
    padding: 32px 28px 48px;
  }

  /* ─── Header ─── */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 24px;
  }
  .header-left h1 {
    font-size: 26px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.3px;
    margin-bottom: 4px;
  }
  .header-left p {
    font-size: 14px;
    color: var(--text-secondary);
  }
  .header-right {
    text-align: right;
    font-size: 13px;
    color: var(--text-secondary);
    padding-top: 4px;
  }
  .header-right .ts {
    font-weight: 600;
    color: var(--text);
  }

  /* ─── KPI Row ─── */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .kpi {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 26px;
  }
  .kpi-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .kpi-value {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 6px;
  }
  .kpi-sub {
    font-size: 12px;
    color: var(--text-secondary);
  }
  /* Quota bar */
  .qbar-wrap {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .qbar-cap {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .qbar-track {
    flex: 1;
    height: 8px;
    background: var(--border-light);
    border-radius: 4px;
    overflow: hidden;
  }
  .qbar-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--green), var(--teal));
    transition: width 0.6s ease;
  }

  /* ─── Three Board Grid ─── */
  .boards {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
  }
  .board {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .board-head {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
  }
  .board-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 2px;
  }
  .board-sub {
    font-size: 11px;
    color: var(--text-muted);
  }

  .board table {
    width: 100%;
    border-collapse: collapse;
  }
  .board thead th {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--text-muted);
    text-align: right;
    padding: 10px 14px;
    background: #fafbfc;
    border-bottom: 1px solid var(--border);
  }
  .board thead th:first-child {
    text-align: left;
    padding-left: 20px;
  }
  .board thead th:last-child { padding-right: 20px; }

  .board tbody td {
    padding: 11px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    text-align: right;
    border-bottom: 1px solid var(--border-light);
  }
  .board tbody td:first-child {
    text-align: left;
    padding-left: 20px;
  }
  .board tbody td:last-child { padding-right: 20px; }
  .board tbody tr:hover { background: var(--row-hover); }
  .board tbody tr:last-child td { border-bottom: none; }

  .board tfoot td {
    padding: 12px 14px;
    font-size: 12px;
    font-weight: 700;
    border-top: 2px solid var(--border);
    background: #fafbfc;
    text-align: right;
    color: var(--text);
  }
  .board tfoot td:first-child {
    text-align: left;
    padding-left: 20px;
    color: var(--text-secondary);
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.5px;
  }
  .board tfoot td:last-child { padding-right: 20px; }

  /* Rep name in boards */
  .rep-name { font-weight: 600; color: var(--text); }
  .rank-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px; height: 20px;
    border-radius: 5px;
    font-size: 10px;
    font-weight: 800;
    margin-right: 8px;
    font-family: var(--mono);
    background: var(--border-light);
    color: var(--text-muted);
    vertical-align: middle;
  }
  .rank-1 { background: #dbeafe; color: var(--blue); }
  .rank-2 { background: var(--green-bg); color: var(--green); }
  .rank-3 { background: var(--green-bg); color: var(--green); }

  /* Badges */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 5px;
    white-space: nowrap;
    margin-left: 6px;
    vertical-align: middle;
  }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-green::before { content: '✓'; font-size: 8px; }

  /* Quota mini bar */
  .q-cell {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
  }
  .q-bar {
    width: 60px;
    height: 5px;
    background: var(--border-light);
    border-radius: 3px;
    overflow: hidden;
  }
  .q-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
  }
  .c-green { background: var(--green); color: var(--green); }
  .c-teal { background: var(--teal); color: var(--teal); }
  .c-amber { background: var(--amber); color: var(--amber); }
  .c-red { background: var(--red); color: var(--red); }

  .pct-text {
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 700;
    min-width: 42px;
    text-align: right;
  }

  /* Rate values */
  .rv { font-weight: 600; }
  .rv-good { color: var(--green); }
  .rv-ok { color: var(--amber); }
  .rv-low { color: var(--red); }

  /* ─── Footer ─── */
  .footer {
    text-align: center;
    margin-top: 20px;
    font-size: 11px;
    color: var(--text-faint);
  }

  /* ─── Loading ─── */
  .loading {
    text-align: center;
    padding: 100px 24px;
    color: var(--text-secondary);
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .fade { opacity: 0; transform: translateY(6px); animation: up 0.35s ease forwards; }
  .d1 { animation-delay: 0.04s; }
  .d2 { animation-delay: 0.08s; }
  @keyframes up { to { opacity: 1; transform: none; } }

  /* ─── Responsive ─── */
  @media (max-width: 1200px) {
    .boards { grid-template-columns: 1fr; }
  }
  @media (max-width: 900px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 600px) {
    .wrap { padding: 16px 12px 32px; }
    .kpi-row { grid-template-columns: 1fr; }
    .header { flex-direction: column; gap: 8px; }
    .header-right { text-align: left; }
    .kpi-value { font-size: 28px; }
  }
</style>
</head>
<body>

<div class="wrap" id="app">
  <div class="loading">
    <div class="spinner"></div>
    Loading dashboard&hellip;
  </div>
</div>

<script>
(async function() {
  const app = document.getElementById('app');
  try {
    const r = await fetch('data.json?' + Date.now());
    if (!r.ok) throw new Error('data.json not found');
    const D = await r.json();
    app.innerHTML = '';
    render(D);
  } catch (e) {
    app.innerHTML = `<div class="loading" style="color:var(--red)">Failed to load: ${e.message}</div>`;
  }

  function fmt$(n) {
    if (Math.abs(n) >= 1000) return '$' + (n/1000).toFixed(1).replace(/\.0$/,'') + 'K';
    return '$' + n.toLocaleString('en-US',{maximumFractionDigits:0});
  }
  function fmtBig$(n) {
    if (n >= 1000000) return '$' + (n/1e6).toFixed(2) + 'M';
    if (n >= 1000) return '$' + (n/1000).toFixed(1) + 'K';
    return '$' + n.toFixed(0);
  }

  function toPST(s) {
    const d = new Date(s.replace(' UTC','Z').replace(' ','T'));
    return d.toLocaleString('en-US', {
      timeZone:'America/Los_Angeles',
      weekday:'long', year:'numeric', month:'long', day:'numeric',
      hour:'numeric', minute:'2-digit', hour12:true
    }) + ' PST';
  }

  function qColor(p) {
    if (p >= 100) return 'c-green';
    if (p >= 70) return 'c-teal';
    if (p >= 40) return 'c-amber';
    return 'c-red';
  }
  function rvClass(v, g, o) {
    if (v >= g) return 'rv rv-good';
    if (v >= o) return 'rv rv-ok';
    return 'rv rv-low';
  }
  function rankCls(i) {
    if (i === 0) return 'rank-num rank-1';
    if (i < 3) return 'rank-num rank-2';
    return 'rank-num';
  }

  function render(D) {
    const reps = D.reps || [];
    const remaining = Math.max(0, D.team_quota - D.total_revenue);
    const daysLeft = D.days_in_month - D.day_of_month;
    const qPct = Math.min(D.pct_team_quota, 100);

    // ── Header
    const header = `
      <div class="header fade">
        <div class="header-left">
          <h1>Sales Performance Dashboard</h1>
          <p>${D.month_label} &middot; Month-to-Date Performance</p>
        </div>
        <div class="header-right"><span class="ts">${toPST(D.updated_at)}</span></div>
      </div>`;

    // ── KPIs
    const kpis = `
      <div class="kpi-row fade d1">
        <div class="kpi">
          <div class="kpi-label">MTD Revenue</div>
          <div class="kpi-value">${fmtBig$(D.total_revenue)}</div>
          <div class="kpi-sub">${D.pct_team_quota}% to $${(D.team_quota/1000).toFixed(0)}K goal</div>
          <div class="qbar-wrap">
            <span class="qbar-cap">$0</span>
            <div class="qbar-track"><div class="qbar-fill" style="width:${qPct}%"></div></div>
            <span class="qbar-cap">$${(D.team_quota/1000).toFixed(0)}K</span>
          </div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Deals Closed MTD</div>
          <div class="kpi-value">${D.total_deals}</div>
          <div class="kpi-sub">${D.team_close_rate||0}% close rate &middot; ${D.total_booked} leads</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Today&rsquo;s Revenue</div>
          <div class="kpi-value">${fmtBig$(D.today_revenue)}</div>
          <div class="kpi-sub">${D.today_deals} deal${D.today_deals!==1?'s':''} closed today</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Remaining to Goal</div>
          <div class="kpi-value">${fmtBig$(remaining)}</div>
          <div class="kpi-sub">${daysLeft} day${daysLeft!==1?'s':''} left in ${D.month_label.split(' ')[0]}</div>
        </div>
      </div>`;

    // ── BOARD 1: Revenue Closed
    const revSorted = [...reps].sort((a,b) => b.revenue - a.revenue);
    const revRows = revSorted.map((r,i) => {
      let qHtml;
      if (!r.quota) {
        qHtml = `<span class="pct-text" style="color:var(--text-faint)">&mdash;</span>`;
      } else {
        const cc = qColor(r.pct_to_quota);
        const bw = Math.min(r.pct_to_quota, 100);
        const badge = r.pct_to_quota >= 100 ? `<span class="badge badge-green">Goal</span>` : '';
        qHtml = `<div class="q-cell"><div class="q-bar"><div class="q-bar-fill ${cc}" style="width:${bw}%"></div></div><span class="pct-text" style="color:var(--${cc.replace('c-','')});">${r.pct_to_quota}%</span></div>`;
      }
      return `<tr>
        <td><span class="${rankCls(i)}">${i+1}</span><span class="rep-name">${r.name}</span>${r.quota && r.pct_to_quota>=100?'<span class="badge badge-green">Goal</span>':''}</td>
        <td>${fmt$(r.revenue)}</td>
        <td>${qHtml}</td>
      </tr>`;
    }).join('');
    const tqPct = D.team_quota > 0 ? D.pct_team_quota : 0;

    const board1 = `
      <div class="board fade d2">
        <div class="board-head">
          <div class="board-title">Revenue Closed</div>
          <div class="board-sub">Per rep &middot; % to quota</div>
        </div>
        <table>
          <thead><tr><th>Rep</th><th>Revenue</th><th>% Quota</th></tr></thead>
          <tbody>${revRows}</tbody>
          <tfoot><tr><td>Team Total</td><td>${fmt$(D.total_revenue)}</td><td><span class="pct-text" style="color:var(--${qColor(tqPct).replace('c-','')})">${tqPct}%</span></td></tr></tfoot>
        </table>
      </div>`;

    // ── BOARD 2: Opps Closed
    const dealSorted = [...reps].sort((a,b) => b.deals - a.deals);
    const dealRows = dealSorted.map((r,i) => {
      const cls = rvClass(r.close_rate, 20, 10);
      return `<tr>
        <td><span class="${rankCls(i)}">${i+1}</span><span class="rep-name">${r.name}</span></td>
        <td>${r.deals}</td>
        <td><span class="${cls}">${r.close_rate}%</span></td>
      </tr>`;
    }).join('');

    const board2 = `
      <div class="board fade d2">
        <div class="board-head">
          <div class="board-title">Opps Closed</div>
          <div class="board-sub">Deals closed &middot; close rate</div>
        </div>
        <table>
          <thead><tr><th>Rep</th><th>Deals</th><th>Close %</th></tr></thead>
          <tbody>${dealRows}</tbody>
          <tfoot><tr><td>Team Total</td><td>${D.total_deals}</td><td><span class="${rvClass(D.team_close_rate||0,20,10)}">${D.team_close_rate||0}%</span></td></tr></tfoot>
        </table>
      </div>`;

    // ── BOARD 3: Meetings Booked / Shown
    const mtgSorted = [...reps].sort((a,b) => b.booked - a.booked);
    const mtgRows = mtgSorted.map((r,i) => {
      const cls = rvClass(r.show_rate, 65, 45);
      return `<tr>
        <td><span class="${rankCls(i)}">${i+1}</span><span class="rep-name">${r.name}</span></td>
        <td>${r.booked}</td>
        <td>${r.shown}</td>
        <td><span class="${cls}">${r.show_rate}%</span></td>
      </tr>`;
    }).join('');

    const board3 = `
      <div class="board fade d2">
        <div class="board-head">
          <div class="board-title">Meetings Booked / Shown</div>
          <div class="board-sub">New meetings &middot; show rate</div>
        </div>
        <table>
          <thead><tr><th>Rep</th><th>Booked</th><th>Shown</th><th>Show %</th></tr></thead>
          <tbody>${mtgRows}</tbody>
          <tfoot><tr><td>Team Total</td><td>${D.total_booked}</td><td>${D.total_shown}</td><td><span class="${rvClass(D.team_show_rate||0,65,45)}">${D.team_show_rate||0}%</span></td></tr></tfoot>
        </table>
      </div>`;

    const footer = `<div class="footer fade d2">Data from Close CRM &middot; Auto-updates hourly Mon&ndash;Fri 7 AM &ndash; 5 PM PST</div>`;

    app.innerHTML = header + kpis + `<div class="boards">${board1}${board2}${board3}</div>` + footer;
  }

  setInterval(() => location.reload(), 5 * 60 * 1000);
})();
</script>
</body>
</html>
