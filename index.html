<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Performance Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f6f8;
    --white: #ffffff;
    --text: #1a1d23;
    --text-secondary: #5f6b7a;
    --text-muted: #8c95a4;
    --text-faint: #b0b8c6;
    --border: #e5e7ec;
    --border-light: #eef0f3;
    --row-hover: #f8f9fb;
    --th-bg: #fafbfc;
    --green: #10b981;
    --green-bg: #ecfdf5;
    --teal: #0d9488;
    --blue: #3b82f6;
    --amber: #f59e0b;
    --amber-bg: #fffbeb;
    --red: #ef4444;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'JetBrains Mono', 'SF Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .wrap {
    max-width: 1500px;
    margin: 0 auto;
    padding: 40px 28px 32px;
  }

  /* ─── Top Bar (info table | month title | KPI cards) ─── */
  .top-bar {
    display: flex;
    align-items: stretch;
    gap: 14px;
    margin-bottom: 12px;
  }

  /* Info table (left) */
  .info-table {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .info-table table { border-collapse: collapse; }
  .info-table td {
    padding: 10px 20px;
    font-size: 13px;
    border-bottom: 1px solid var(--border-light);
  }
  .info-table tr:last-child td { border-bottom: none; }
  .info-table td:first-child {
    color: var(--text-muted);
    font-weight: 600;
    border-right: 1px solid var(--border-light);
    white-space: nowrap;
  }
  .info-table td:last-child {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 14px;
    color: var(--text);
    text-align: right;
  }

  /* Month title (center) */
  .month-center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .month-center h1 {
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }
  .month-center .meta {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* KPI cards (right) */
  .kpi-cards {
    display: flex;
    gap: 12px;
    flex-shrink: 0;
  }
  .kpi {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 28px;
    min-width: 185px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }
  .kpi-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .kpi-val {
    font-size: 34px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1.1;
  }
  .kpi-sub {
    font-size: 11px;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  /* ─── Quota Strip ─── */
  .quota-strip {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 20px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .qs-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .qs-track {
    flex: 1;
    height: 8px;
    background: var(--border-light);
    border-radius: 4px;
    overflow: hidden;
  }
  .qs-fill {
    height: 100%;
    border-radius: 4px;
    background: linear-gradient(90deg, var(--green), var(--teal));
    transition: width 0.6s ease;
  }
  .qs-pct {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 700;
    color: var(--teal);
    white-space: nowrap;
  }
  .qs-detail {
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* ─── Three Board Grid ─── */
  .boards {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .board {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .board-head {
    padding: 12px 18px 10px;
    border-bottom: 1px solid var(--border);
  }
  .board-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 1px;
  }
  .board-sub {
    font-size: 10px;
    color: var(--text-muted);
  }

  .board table { width: 100%; border-collapse: collapse; }
  .board thead th {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.7px;
    color: var(--text-muted);
    text-align: right;
    padding: 8px 14px;
    background: var(--th-bg);
    border-bottom: 1px solid var(--border);
  }
  .board thead th:first-child { text-align: left; padding-left: 18px; }
  .board thead th:last-child { padding-right: 18px; }

  .board tbody td {
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    text-align: right;
    border-bottom: 1px solid var(--border-light);
  }
  .board tbody td:first-child { text-align: left; padding-left: 18px; }
  .board tbody td:last-child { padding-right: 18px; }
  .board tbody tr:hover { background: var(--row-hover); }
  .board tbody tr:last-child td { border-bottom: none; }

  .board tfoot td {
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 700;
    border-top: 2px solid var(--border);
    background: var(--th-bg);
    text-align: right;
    color: var(--text);
  }
  .board tfoot td:first-child {
    text-align: left; padding-left: 18px;
    color: var(--text-secondary);
    text-transform: uppercase;
    font-size: 10px;
    letter-spacing: 0.5px;
  }
  .board tfoot td:last-child { padding-right: 18px; }

  /* Rank numbers */
  .rk {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 19px; height: 19px;
    border-radius: 5px;
    font-size: 10px;
    font-weight: 800;
    margin-right: 7px;
    font-family: var(--mono);
    background: var(--border-light);
    color: var(--text-muted);
    vertical-align: middle;
  }
  .rk-1 { background: #dbeafe; color: var(--blue); }
  .rk-2, .rk-3 { background: var(--green-bg); color: var(--green); }

  .rep-name { font-weight: 600; vertical-align: middle; }

  /* Goal badge */
  .goal-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 5px;
    background: var(--green-bg);
    color: var(--green);
    margin-left: 6px;
    vertical-align: middle;
  }
  .goal-badge::before { content: '✓'; font-size: 8px; }

  /* Quota mini bar in revenue board */
  .q-cell {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
  }
  .q-bar {
    width: 56px; height: 5px;
    background: var(--border-light);
    border-radius: 3px;
    overflow: hidden;
  }
  .q-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .bg-green { background: var(--green); }
  .bg-teal { background: var(--teal); }
  .bg-amber { background: var(--amber); }
  .bg-red { background: var(--red); }

  .pv {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    min-width: 40px;
    text-align: right;
  }
  .t-green { color: var(--green); }
  .t-teal { color: var(--teal); }
  .t-amber { color: var(--amber); }
  .t-red { color: var(--red); }

  /* Rate values */
  .rv { font-weight: 600; }
  .rv-g { color: var(--green); }
  .rv-a { color: var(--amber); }
  .rv-r { color: var(--red); }

  /* ─── Footer ─── */
  .footer {
    text-align: center;
    margin-top: 12px;
    font-size: 11px;
    color: var(--text-faint);
  }

  /* ─── Loading ─── */
  .loading {
    text-align: center;
    padding: 100px 24px;
    color: var(--text-secondary);
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--green);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .fade { opacity: 0; transform: translateY(6px); animation: up 0.35s ease forwards; }
  .d1 { animation-delay: 0.04s; }
  .d2 { animation-delay: 0.1s; }
  @keyframes up { to { opacity: 1; transform: none; } }

  /* ─── Responsive ─── */
  @media (max-width: 1200px) {
    .boards { grid-template-columns: 1fr; }
    .top-bar { flex-direction: column; align-items: stretch; }
    .kpi-cards { justify-content: center; }
    .month-center { padding: 12px 0; }
  }
  @media (max-width: 600px) {
    .wrap { padding: 16px 10px 32px; }
    .kpi-cards { flex-direction: column; }
    .kpi { min-width: auto; }
    .month-center h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="wrap" id="app">
  <div class="loading"><div class="spinner"></div>Loading dashboard&hellip;</div>
</div>

<script>
(async function() {
  const app = document.getElementById('app');
  try {
    const r = await fetch('data.json?' + Date.now());
    if (!r.ok) throw new Error('data.json not found');
    const D = await r.json();
    app.innerHTML = '';
    render(D);
  } catch (e) {
    app.innerHTML = `<div class="loading" style="color:var(--red)">Failed to load: ${e.message}</div>`;
  }

  function fmt$(n) {
    if (Math.abs(n) >= 1000) return '$' + (n/1000).toFixed(1).replace(/\.0$/,'') + 'K';
    return '$' + n.toLocaleString('en-US',{maximumFractionDigits:0});
  }
  function fmtBig$(n) {
    if (n >= 1000000) return '$' + (n/1e6).toFixed(2) + 'M';
    if (n >= 1000) return '$' + (n/1000).toFixed(1) + 'K';
    return '$' + n.toFixed(0);
  }

  function toPST(s) {
    // Handle both "UTC" and "PST" suffixed timestamps
    const cleaned = s.replace(' UTC','Z').replace(' PST','-08:00').replace(' ','T');
    const d = new Date(cleaned);
    return d.toLocaleString('en-US', {
      timeZone:'America/Los_Angeles',
      weekday:'long', year:'numeric', month:'long', day:'numeric',
      hour:'numeric', minute:'2-digit', hour12:true
    }) + ' PST';
  }

  function qCol(p) {
    if (p >= 100) return ['bg-green','t-green'];
    if (p >= 70)  return ['bg-teal','t-teal'];
    if (p >= 40)  return ['bg-amber','t-amber'];
    return ['bg-red','t-red'];
  }
  function rc(v,g,o) {
    if (v >= g) return 'rv rv-g';
    if (v >= o) return 'rv rv-a';
    return 'rv rv-r';
  }
  function rkC(i) {
    if (i===0) return 'rk rk-1';
    if (i<3) return 'rk rk-'+( i+1);
    return 'rk';
  }

  function render(D) {
    const reps = D.reps || [];
    const remaining = Math.max(0, D.team_quota - D.total_revenue);
    const daysLeft = D.days_in_month - D.day_of_month;
    const qPct = Math.min(D.pct_team_quota, 100);

    // ── TOP BAR
    const topBar = `
      <div class="top-bar fade">
        <div class="info-table">
          <table>
            <tr><td>Day in the month</td><td>${D.day_of_month} / ${D.days_in_month}</td></tr>
            <tr><td>Working days</td><td>${D.working_days_elapsed} / ${D.working_days_total}</td></tr>
            <tr><td>% of month passed</td><td>${Math.round(D.working_days_elapsed / D.working_days_total * 100)}%</td></tr>
          </table>
        </div>
        <div class="month-center">
          <h1>${D.month_label}</h1>
          <div class="meta">${toPST(D.updated_at)}</div>
        </div>
        <div class="kpi-cards">
          <div class="kpi">
            <div class="kpi-label">Today&rsquo;s Revenue</div>
            <div class="kpi-val">${fmtBig$(D.today_revenue)}</div>
            <div class="kpi-sub">${D.today_deals} deal${D.today_deals!==1?'s':''} today</div>
          </div>
          <div class="kpi">
            <div class="kpi-label">MTD Revenue</div>
            <div class="kpi-val">${fmtBig$(D.total_revenue)}</div>
            <div class="kpi-sub">${daysLeft} days left</div>
          </div>
        </div>
      </div>`;

    // ── QUOTA STRIP
    const quotaStrip = `
      <div class="quota-strip fade d1">
        <span class="qs-label">Team Quota</span>
        <div class="qs-track"><div class="qs-fill" style="width:${qPct}%"></div></div>
        <span class="qs-pct">${D.pct_team_quota}%</span>
        <span class="qs-detail">${fmtBig$(D.total_revenue)} / ${fmtBig$(D.team_quota)}</span>
      </div>`;

    // ── BOARD 1: Revenue Closed
    const revSorted = [...reps].sort((a,b) => b.revenue - a.revenue);
    const b1Rows = revSorted.map((r,i) => {
      let qH;
if (!r.quota) {
        if (r.deals > 0) {
          qH = `<div class="q-cell"><div class="q-bar"><div class="q-bar-fill bg-green" style="width:100%"></div></div><span class="pv t-green">N/A</span></div>`;
        } else {
          qH = `<span class="pv" style="color:var(--amber)">● Ramping</span>`;
        }
      } else {
        const [bg,tc] = qCol(r.pct_to_quota);
        const bw = Math.min(r.pct_to_quota, 100);
        qH = `<div class="q-cell"><div class="q-bar"><div class="q-bar-fill ${bg}" style="width:${bw}%"></div></div><span class="pv ${tc}">${r.pct_to_quota}%</span></div>`;
      }
      const badge = (r.quota && r.pct_to_quota >= 100) ? '<span class="goal-badge">At Goal</span>' : '';
      return `<tr>
        <td><span class="${rkC(i)}">${i+1}</span><span class="rep-name">${r.name}</span>${badge}</td>
        <td>${fmt$(r.revenue)}</td>
        <td>${qH}</td>
      </tr>`;
    }).join('');
    const [,tqTc] = qCol(D.pct_team_quota);
    const board1 = `
      <div class="board fade d2">
        <div class="board-head"><div class="board-title">Revenue Closed</div><div class="board-sub">Per rep &middot; % to quota</div></div>
        <table>
          <thead><tr><th>Rep</th><th>Revenue</th><th>% Quota</th></tr></thead>
          <tbody>${b1Rows}</tbody>
          <tfoot><tr><td>Team Total</td><td>${fmt$(D.total_revenue)}</td><td><span class="pv ${tqTc}">${D.pct_team_quota}%</span></td></tr></tfoot>
        </table>
      </div>`;

    // ── BOARD 2: Opps Closed
    const dealSorted = [...reps].sort((a,b) => b.deals - a.deals);
    const b2Rows = dealSorted.map((r,i) => `<tr>
      <td><span class="${rkC(i)}">${i+1}</span><span class="rep-name">${r.name}</span></td>
      <td>${r.deals}</td>
      <td><span class="${rc(r.close_rate,20,10)}">${r.close_rate}%</span></td>
    </tr>`).join('');
    const board2 = `
      <div class="board fade d2">
        <div class="board-head"><div class="board-title">Opps Closed</div><div class="board-sub">Deals closed &middot; close rate</div></div>
        <table>
          <thead><tr><th>Rep</th><th>Deals</th><th>Close %</th></tr></thead>
          <tbody>${b2Rows}</tbody>
          <tfoot><tr><td>Team Total</td><td>${D.total_deals}</td><td><span class="${rc(D.team_close_rate||0,20,10)}">${D.team_close_rate||0}%</span></td></tr></tfoot>
        </table>
      </div>`;

    // ── BOARD 3: Meetings Booked / Shown
    const mtgSorted = [...reps].sort((a,b) => b.booked - a.booked);
    const b3Rows = mtgSorted.map((r,i) => `<tr>
      <td><span class="${rkC(i)}">${i+1}</span><span class="rep-name">${r.name}</span></td>
      <td>${r.booked}</td>
      <td>${r.shown}</td>
      <td><span class="${rc(r.show_rate,65,45)}">${r.show_rate}%</span></td>
    </tr>`).join('');
    const board3 = `
      <div class="board fade d2">
        <div class="board-head"><div class="board-title">Meetings Booked / Shown</div><div class="board-sub">New meetings &middot; show rate</div></div>
        <table>
          <thead><tr><th>Rep</th><th>Booked</th><th>Shown</th><th>Show %</th></tr></thead>
          <tbody>${b3Rows}</tbody>
          <tfoot><tr><td>Team Total</td><td>${D.total_booked}</td><td>${D.total_shown}</td><td><span class="${rc(D.team_show_rate||0,65,45)}">${D.team_show_rate||0}%</span></td></tr></tfoot>
        </table>
      </div>`;

    const footer = `<div class="footer fade d2">Data from Close CRM &middot; Auto-updates hourly Mon&ndash;Fri 7 AM &ndash; 5 PM PST</div>`;
    app.innerHTML = topBar + quotaStrip + `<div class="boards">${board1}${board2}${board3}</div>` + footer;
  }

  setInterval(() => location.reload(), 5 * 60 * 1000);
})();
</script>
</body>
</html>
